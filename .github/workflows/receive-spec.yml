name: Update OpenAPI Spec

on:
  repository_dispatch:
    types: [spec-updated]

jobs:
  update-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOGUL_SYNC_TOKEN }}
          fetch-depth: 0

      - name: Download latest spec from togul
        env:
          GH_TOKEN: ${{ secrets.TOGUL_SYNC_TOKEN }}
        run: |
          gh api repos/togulapp/togul/contents/openapi.yaml \
            -H "Accept: application/vnd.github.raw+json" \
            > openapi.yaml

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet openapi.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.TOGUL_SYNC_TOKEN }}
          SPEC_VERSION: ${{ github.event.client_payload.version }}
        run: |
          BRANCH="sync/openapi-${SPEC_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "${BRANCH}"
          git add openapi.yaml
          git commit -m "chore: sync openapi.yaml to ${SPEC_VERSION}"
          git fetch origin "${BRANCH}" || true
          git push --force-with-lease origin "${BRANCH}"

          if [ "$(gh pr list --head "${BRANCH}" --json number --jq 'length')" -gt 0 ]; then
            echo "Pull request for ${BRANCH} already exists; skipping creation."
          else
            gh pr create \
              --title "Sync OpenAPI spec to ${SPEC_VERSION}" \
              --body "Automated sync from [togulapp/togul](https://github.com/togulapp/togul)." \
              --base main \
              --head "${BRANCH}"
          fi
